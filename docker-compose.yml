services:
  postgres:
    image: postgres:17-alpine
    container_name: oberon-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oberon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oberon}
      POSTGRES_DB: ${POSTGRES_DB:-oberon}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-oberon}']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: oberon-minio
    restart: unless-stopped
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  oberon-back:
    image: ghcr.io/${GHCR_OWNER:-your-org}/oberon-back:latest
    container_name: oberon-back
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # App
      NODE_ENV: production
      PORT: 3000

      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-oberon}:${POSTGRES_PASSWORD:-oberon}@postgres:5432/${POSTGRES_DB:-oberon}

      # JWT
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret}

      # MinIO / S3
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_REGION: us-east-1
      S3_BUCKET_PREFIX: oberon

      # Polza AI
      POLZA_API_BASE_URL: ${POLZA_API_BASE_URL:-https://polza.ai/api}
      POLZA_API_KEY: ${POLZA_API_KEY:-change-me-polza-key}

      # Pricing
      GENERATION_MARKUP_PERCENT: ${GENERATION_MARKUP_PERCENT:-30}

      # YooMoney
      YOOMONEY_SHOP_ID: ${YOOMONEY_SHOP_ID:-stub}
      YOOMONEY_SECRET_KEY: ${YOOMONEY_SECRET_KEY:-stub}
      YOOMONEY_RETURN_URL: ${YOOMONEY_RETURN_URL:-https://diz-diz.ru/wallet}

volumes:
  postgres_data:
  minio_data:
