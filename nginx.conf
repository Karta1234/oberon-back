# HTTP → HTTPS redirect
server {
    listen 80;
    server_name diz-diz.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name diz-diz.ru;

    ssl_certificate     /etc/letsencrypt/live/diz-diz.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/diz-diz.ru/privkey.pem;

    client_max_body_size 50m;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # API — проксируем на NestJS
    location ~ ^/(auth|generation|wallet|payment|settings)(/|$) {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Статический фронт
    location / {
        root /var/www/oberon;
        try_files $uri $uri/ /index.html;
    }

    # Кеширование Vite assets (имена с хешами)
    location /assets/ {
        root /var/www/oberon;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
